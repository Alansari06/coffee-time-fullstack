<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Checkout — Coffee Time</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      /* same :root variables as your site */
      :root {
        --brown-deep: #1a0a00;
        --brown-dark: #2b1100;
        --brown-mid: #4a1e00;
        --amber: #d4820a;
        --amber-light: #f0a830;
        --cream: #f5e6c8;
        --white: #ffffff;
        --text-muted: rgba(255, 255, 255, 0.65);
        --card-bg: rgba(255, 255, 255, 0.04);
        --card-border: rgba(255, 255, 255, 0.1);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--brown-deep);
        color: var(--white);
        min-height: 100vh;
        padding: 40px 20px;
      }

      .container {
        max-width: 500px;
        margin: 0 auto;
      }

      h1 {
        font-family: "Playfair Display", serif;
        font-size: 28px;
        margin-bottom: 5px;
      }
      h1 em {
        font-style: italic;
        color: var(--amber-light);
      }

      .subtitle {
        color: var(--text-muted);
        font-size: 14px;
        margin-bottom: 30px;
      }

      /* section box — same as your checkout style */
      .box {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 16px;
        padding: 24px;
        margin-bottom: 20px;
      }
      .box h3 {
        font-size: 15px;
        color: var(--amber);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-bottom: 16px;
      }

      /* inputs — same as your existing inputs */
      input {
        width: 100%;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        padding: 12px 16px;
        color: var(--white);
        font-size: 14px;
        font-family: "DM Sans", sans-serif;
        outline: none;
        margin-bottom: 12px;
        transition: border-color 0.2s;
      }
      input:focus {
        border-color: var(--amber);
      }
      input::placeholder {
        color: rgba(255, 255, 255, 0.3);
      }

      /* 2-column grid for City + Pincode */
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      /* GPS button */
      .btn-gps {
        width: 100%;
        background: transparent;
        border: 1px dashed var(--amber);
        color: var(--amber-light);
        padding: 11px 16px;
        border-radius: 10px;
        font-family: "DM Sans", sans-serif;
        font-size: 13px;
        cursor: pointer;
        margin-bottom: 16px;
        transition: background 0.2s;
      }
      .btn-gps:hover {
        background: rgba(212, 130, 10, 0.1);
      }

      /* proceed button — same style as your btn-pay */
      .btn-proceed {
        width: 100%;
        background: var(--amber);
        color: var(--brown-deep);
        border: none;
        padding: 16px;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        font-family: "DM Sans", sans-serif;
        transition:
          background 0.2s,
          transform 0.2s;
      }
      .btn-proceed:hover {
        background: var(--amber-light);
        transform: translateY(-2px);
      }

      .secure {
        text-align: center;
        color: rgba(255, 255, 255, 0.35);
        font-size: 12px;
        margin-top: 12px;
      }

      @media (max-width: 480px) {
        .row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>☕ <em>Delivery</em> Address</h1>
      <p class="subtitle">Where should we send your coffee?</p>

      <!-- address form — POST to /checkout -->
      <form method="POST" action="/checkout">
        <!-- Personal info box -->
        <div class="box">
          <h3>Your Info</h3>
          <input type="text" name="name" placeholder="Full Name" required />
          <input type="tel" name="phone" placeholder="Phone Number" required />
        </div>

        <!-- Address box -->
        <div class="box">
          <h3>Address</h3>

          <!-- GPS button — fills fields via JS -->
          <button type="button" class="btn-gps" onclick="getLocation()">
            📍 Use My Current Location
          </button>

          <input
            type="text"
            name="address"
            id="address"
            placeholder="House No, Street, Area"
            required
          />
          <input
            type="text"
            name="landmark"
            id="landmark"
            placeholder="Landmark (optional)"
          />

          <div class="row">
            <input
              type="text"
              name="city"
              id="city"
              placeholder="City"
              required
            />
            <input
              type="text"
              name="pincode"
              id="pincode"
              placeholder="Pincode"
              maxlength="6"
              required
            />
          </div>
        </div>

        <!-- Order total strip -->
        <div
          class="box"
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
          "
        >
          <span style="color: var(--text-muted); font-size: 14px"
            >Order Total</span
          >
          <strong
            style="
              font-family: &quot;Playfair Display&quot;, serif;
              font-size: 22px;
              color: var(--amber-light);
            "
          >
            ₹{{ "%.2f"|format(total) }}
          </strong>
        </div>

        <button type="submit" class="btn-proceed">
          Continue to Payment →
        </button>
        <p class="secure">🔒 Your address is saved securely</p>
      </form>
    </div>

    <script>
      // GPS auto-fill
      function getLocation() {
        const btn = document.querySelector(".btn-gps");
        btn.textContent = "⏳ Fetching location...";

        navigator.geolocation.getCurrentPosition(
          async (pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;

            // Use free reverse geocoding (no API key needed)
            const res = await fetch(
              `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`,
            );
            const data = await res.json();
            const addr = data.address;

            // fill the form fields
            document.getElementById("address").value =
              `${addr.road || ""} ${addr.suburb || ""}`.trim();
            document.getElementById("city").value =
              addr.city || addr.town || addr.village || "";
            document.getElementById("pincode").value = addr.postcode || "";

            btn.textContent = "✅ Location fetched!";
          },
          () => {
            btn.textContent = "❌ Could not get location";
          },
        );
      }
    </script>
  </body>
</html>
